services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: ecom
      MYSQL_PASSWORD: ecom_pw
    ports:
      - "3307:3306"   # host 3307 -> container 3306 (3306 is taken by a local MySQL)
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uecom", "-pecom_pw"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: "mysql://ecom:ecom_pw@mysql:3306/ecommerce"
      PORT: 4000
      NODE_ENV: development
      JWT_ACCESS_SECRET: dev_access_secret_change_me
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me
      CORS_ORIGIN: "http://localhost:5173"
    ports:
      - "4000:4000"

volumes:
  mysql_data:
